name: Refresh Mission tracker

on:
  schedule:
    # Mondays 14:00 UTC (~weekly CMS-oriented cadence)
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull latest CMS snapshots
        run: npm run refresh:mission-tracker

      - name: Commit if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/mission-tracker/charts.json public/mission-tracker/data.json
          if git diff --staged --quiet; then
            echo "No data changes"
          else
            git commit -m "Refresh Mission Hospital tracker CMS snapshots."
            git push
          fi
