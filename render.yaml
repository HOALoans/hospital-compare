services:
  - type: web
    name: hospital-compare
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    # Partner data, CMS cache, and archive trends persist across redeploys (~$0.25/GB/mo).
    # Blueprint deploys provision this automatically. If the service was created manually,
    # add the same disk in Dashboard → Settings → Disks (mount path must match DATA_DIR).
    disk:
      name: parigrado-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      # Cap V8's heap below the 512MB free-tier limit so the garbage collector
      # runs aggressively instead of the container OOM-killer restarting us.
      - key: NODE_OPTIONS
        value: --max-old-space-size=400
      # Archive trend ingest now streams CSVs line-by-line and runs sequentially
      # only after the score cache is ready, so it fits the free tier. Flip to
      # "false" to keep the web service lean and run `npm run ingest:archives`
      # as a separate one-off job instead.
      - key: INGEST_ARCHIVES
        value: "true"
      # Signs admin session tokens after login; also accepts Bearer ADMIN_SECRET for scripts.
      - key: ADMIN_SECRET
        sync: false
      # Email allowlist for partner admin sign-in (comma-separated for multiple).
      - key: ADMIN_EMAIL
        value: larry@hoaloanservices.com
        sync: false
      # Password for partner admin sign-in (set in Render dashboard).
      - key: ADMIN_PASSWORD
        sync: false
      # --- API usage caps (in-memory per IP; see server/rateLimit.ts) ---
      # Set RATE_LIMIT_DISABLED=true to turn off. Defaults: 60s window,
      # 60 CMS proxy requests/IP, 180 hospital API requests/IP.
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_CMS_MAX
        value: "60"
      - key: RATE_LIMIT_HOSPITAL_MAX
        value: "180"
